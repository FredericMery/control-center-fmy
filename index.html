

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control Center FMY</title>
<meta name="theme-color" content="#0f172a">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f172a;
  color:white;
}

header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  cursor:pointer;
}

#toggleView{
  background:#1e293b;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  color:white;
}

main{
  padding:20px;
}

.action-card{
  background:#1e293b;
  padding:16px;
  margin-bottom:12px;
  border-radius:16px;
  transition:.25s;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.action-left{
  flex:1;
}

.badge{
  width:10px;
  height:10px;
  border-radius:50%;
  margin-right:8px;
  display:inline-block;
}

.low{background:#64748b;}
.normal{background:#3b82f6;}
.high{background:#f59e0b;}
.urgent{background:#ef4444;}

#fab{
  position:fixed;
  bottom:25px;
  right:25px;
  width:65px;
  height:65px;
  border-radius:50%;
  font-size:30px;
  border:none;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:white;
}

#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  justify-content:center;
  align-items:center;
}

.hidden{display:none!important;}

.modal-content{
  background:#1e293b;
  padding:24px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}

input, select{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

#saveBtn{
  margin-top:16px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <h3>Control Center</h3>
  <button id="toggleView">Archives</button>
</header>

<main id="actionsList"></main>

<button id="fab">+</button>

<div id="modal" class="hidden">
  <div class="modal-content">
    <h3>Nouvelle Action</h3>
    <input type="text" id="actionText" placeholder="Décrire l'action">
    <input type="date" id="deadline">
    <select id="priority">
      <option value="low">Faible</option>
      <option value="normal" selected>Normale</option>
      <option value="high">Haute</option>
      <option value="urgent">Urgente</option>
    </select>
    <button id="saveBtn">Ajouter</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl='https://fwfvbklrezgiwpfyywtv.supabase.co'
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3ZnZia2xyZXpnaXdwZnl5d3R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MzkwNDIsImV4cCI6MjA4NjQxNTA0Mn0.g58rXlwhfqvp5AiYZUOTlS-n2g-wG2Jufdyyu6ncSrg'
const db=window.supabase.createClient(supabaseUrl,supabaseKey)

let showArchived=false
let tasks=[]

const modal=document.getElementById("modal")
const fab=document.getElementById("fab")
const toggleView=document.getElementById("toggleView")

fab.onclick=()=>modal.classList.remove("hidden")
modal.onclick=e=>{if(e.target===modal)modal.classList.add("hidden")}

toggleView.onclick=()=>{
  showArchived=!showArchived
  toggleView.textContent=showArchived?"Actives":"Archives"
  fetchTasks()
}

async function fetchTasks(){
  const {data}=await db
    .from('tasks')
    .select('*')
    .eq('archived',showArchived)
    .order('created_at',{ascending:false})

  tasks=data||[]
  renderTasks()
}

async function archiveTask(id){
  await db.from('tasks').update({archived:true}).eq('id',id)
}

function renderTasks(){
  const list=document.getElementById("actionsList")
  list.innerHTML=""

  tasks.forEach(task=>{
    const div=document.createElement("div")
    div.className="action-card"
    div.innerHTML=`
      <div class="action-left">
        <span class="badge ${task.priority}"></span>
        ${task.title}
      </div>
      <div>${task.deadline||""}</div>
    `
    div.ondblclick=()=>archiveTask(task.id)
    list.appendChild(div)
  })
}

document.getElementById("saveBtn").onclick=async()=>{
  const text=document.getElementById("actionText").value
  const deadline=document.getElementById("deadline").value
  const priority=document.getElementById("priority").value
  if(!text)return

  await db.from('tasks').insert([{title:text,deadline,priority}])

  document.getElementById("actionText").value=""
  modal.classList.add("hidden")
}

window.onload=()=>{
  fetchTasks()
  db.channel('tasks-realtime')
    .on('postgres_changes',
      {event:'*',schema:'public',table:'tasks'},
      ()=>fetchTasks()
    )
    .subscribe()
}
</script>

</body>
</html>
