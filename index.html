<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control Center FMY</title>
<meta name="theme-color" content="#0f172a">

<link rel="stylesheet" href="style.css">
</head>

<body>


<header>
  <div class="mode-switch">
    <button id="proBtn" class="active">PRO</button>
    <button id="persoBtn">PERSO</button>
  </div>
  <button id="toggleView">Archives</button>

  <button onclick="window.location.href='memoire.html'">
  Mémoire
</button>

</header>


<main id="actionsList"></main>

<button id="fab">+</button>

<div id="modal" class="hidden">
  <div class="modal-content">
    <h3>Nouvelle Action</h3>
    <input type="text" id="actionText" placeholder="Décrire l'action">
    <input type="date" id="deadline">
    <select id="priority">
      <option value="low">Faible</option>
      <option value="normal" selected>Normale</option>
      <option value="high">Haute</option>
      <option value="urgent">Urgente</option>
    </select>
    <button id="saveBtn">Ajouter</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
