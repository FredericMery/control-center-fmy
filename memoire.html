<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mémoire - Control Center</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:white;
}

/* ===== HEADER ===== */

.header{
  padding:40px 20px 20px 20px;
}

.header h1{
  margin:0;
  font-size:28px;
  font-weight:600;
}

.header p{
  opacity:.6;
  margin-top:6px;
  font-size:14px;
}

/* ===== GRID ===== */

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

/* ===== CARD ===== */

.card{
  position:relative;
  padding:30px 20px;
  border-radius:24px;
  cursor:pointer;
  transition:.35s;
  overflow:hidden;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 40px rgba(0,0,0,.6);
}

.card-content{
  position:relative;
  z-index:2;
}

.card-icon{
  font-size:36px;
  margin-bottom:12px;
}

.card-title{
  font-size:18px;
  font-weight:600;
}

/* ===== COLOR THEMES ===== */

.lieux{
  background:linear-gradient(135deg,#0ea5e9,#1e3a8a);
}

.vins{
  background:linear-gradient(135deg,#7c3aed,#4c1d95);
}

.cadeaux{
  background:linear-gradient(135deg,#f59e0b,#b45309);
}

.autres{
  background:linear-gradient(135deg,#14b8a6,#0f766e);
}

/* ===== BACK BUTTON ===== */

.footer{
  padding:30px 20px;
}

.back{
  display:inline-block;
  padding:12px 22px;
  border-radius:30px;
  background:#3b82f6;
  text-decoration:none;
  color:white;
  font-weight:500;
  transition:.25s;
}

.back:hover{
  background:#2563eb;
}
</style>
</head>

<body>

<div class="header">
  <h1>Mémoire</h1>
  <p>Organise tes souvenirs, vins et idées personnelles</p>
</div>

<div class="grid">

  <div class="card lieux">
    <div class="card-content">
      <div class="card-icon">📍</div>
      <div class="card-title">Lieux & Activités</div>
    </div>
  </div>

  <div class="card vins" onclick="window.location.href='vins.html'">
    <div class="card-content">
      <div class="card-icon">🍷</div>
      <div class="card-title">Vins</div>
    </div>
  </div>

  <div class="card cadeaux" onclick="window.location.href='cadeaux.html'">
        <div class="card-content">
            <div class="card-icon">🎁</div>
            <div class="card-title">Cadeaux</div>
        </div>
    </div>


  <div class="card autres">
    <div class="card-content">
      <div class="card-icon">🧠</div>
      <div class="card-title">Autres</div>
    </div>
  </div>

</div>

<div class="footer">
  <a href="index.html" class="back">← Retour</a>
</div>

</body>
</html>
