<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mémoire - Control Center</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

h2{
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.card{
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  text-align:center;
  font-size:18px;
  cursor:pointer;
  transition:.25s;
}

.card:hover{
  transform:scale(1.03);
  background:#334155;
}

.back{
  margin-top:30px;
  display:inline-block;
  padding:10px 20px;
  background:#3b82f6;
  border-radius:20px;
  text-decoration:none;
  color:white;
}
</style>
</head>

<body>

<h2>Mémoire</h2>

<div class="grid">
  <div class="card">Lieux & Activités</div>
  <div class="card" onclick="window.location.href='vins.html'">
  Vins
</div>

  <div class="card">Cadeaux</div>
  <div class="card">Autres</div>
</div>

<a href="index.html" class="back">← Retour</a>

</body>
</html>
