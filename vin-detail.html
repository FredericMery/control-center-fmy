<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Détail Vin</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="detail-container">

  <img id="wineImage" class="detail-img" style="display:none">

  <div id="wineTitle" class="detail-title"></div>
  <div id="wineStars" class="detail-stars"></div>

  <div id="wikiInfo" class="wiki-box">
    Recherche d’informations...
  </div>

  <div class="action-buttons">
    <button class="delete-btn" onclick="deleteWine()">Supprimer</button>
  </div>

  <a href="vins.html" class="back-link">← Retour</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl='https://fwfvbklrezgiwpfyywtv.supabase.co'
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3ZnZia2xyZXpnaXdwZnl5d3R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MzkwNDIsImV4cCI6MjA4NjQxNTA0Mn0.g58rXlwhfqvp5AiYZUOTlS-n2g-wG2Jufdyyu6ncSrg'
const db=window.supabase.createClient(supabaseUrl,supabaseKey)

const params=new URLSearchParams(window.location.search)
const wineId=params.get("id")

let currentWine=null

async function loadWine(){

  if(!wineId){
    alert("Vin introuvable")
    window.location.href="vins.html"
    return
  }

  const {data,error}=await db
    .from('memories')
    .select('*')
    .eq('id',wineId)
    .single()

  if(error || !data){
    alert("Vin introuvable")
    window.location.href="vins.html"
    return
  }

  currentWine=data

  document.getElementById("wineTitle").innerText=data.title
  document.getElementById("wineStars").innerHTML=
    "⭐".repeat(data.rating || 0)+"☆".repeat(5 - (data.rating || 0))

  if(data.photo_url){
    const img=document.getElementById("wineImage")
    img.src=data.photo_url
    img.style.display="block"
  }

  fetchWiki(data.title)
}

async function fetchWiki(name){

  const wikiDiv=document.getElementById("wikiInfo")
  wikiDiv.innerHTML="Recherche d’informations..."

  try{
    const response=await fetch(
      `https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`
    )

    const result=await response.json()

    if(result.extract){
      wikiDiv.innerHTML=`
        <strong>Informations :</strong><br><br>
        ${result.extract}
        <br><br>
        <a href="${result.content_urls.desktop.page}" target="_blank">
          Voir plus
        </a>
      `
    }else{
      wikiDiv.innerHTML="Aucune information trouvée."
    }

  }catch{
    wikiDiv.innerHTML="Impossible de récupérer les informations."
  }
}

async function deleteWine(){

  if(!confirm("Supprimer ce vin ?")) return

  await db
    .from('memories')
    .delete()
    .eq('id',wineId)

  window.location.href="vins.html"
}

window.onload=loadWine
</script>

</body>
</html>
