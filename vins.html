<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mes Vins</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>Mes Vins</h2>
  <button class="add-btn" onclick="window.location.href='vin-add.html'">+</button>
</header>

<div id="wineList"></div>

<a href="memoire.html" class="back">← Retour</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl='https://fwfvbklrezgiwpfyywtv.supabase.co'
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3ZnZia2xyZXpnaXdwZnl5d3R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MzkwNDIsImV4cCI6MjA4NjQxNTA0Mn0.g58rXlwhfqvp5AiYZUOTlS-n2g-wG2Jufdyyu6ncSrg'
const db=window.supabase.createClient(supabaseUrl,supabaseKey)

async function loadWines(){

  const {data,error}=await db
    .from('memories')
    .select('*')
    .eq('category','vin')
    .order('rating',{ascending:false})
    .order('created_at',{ascending:false})

  if(error){
    console.error(error)
    return
  }

  const container=document.getElementById("wineList")
  container.innerHTML=""

  data.forEach(wine=>{

    const div=document.createElement("div")
    div.className="wine-card"

    div.innerHTML=`
      ${wine.photo_url 
        ? `<img src="${wine.photo_url}" class="wine-image">` 
        : `<div class="wine-image" style="background:#334155;display:flex;align-items:center;justify-content:center;">🍷</div>`
      }

      <div class="wine-body">
        <div class="wine-title">${wine.title}</div>
        <div class="wine-sub">
          ${wine.domaine || ""} ${wine.annee ? "• " + wine.annee : ""}
        </div>
        <div class="stars">
          ${"⭐".repeat(wine.rating || 0)}
        </div>
      </div>
    `

    div.onclick=()=>{
      const query=`${wine.title || ""} ${wine.domaine || ""} ${wine.annee || ""} vin`
      const url="https://www.google.com/search?q="+encodeURIComponent(query)
      window.open(url,"_blank")
    }

    container.appendChild(div)
  })
}

window.onload=loadWines
</script>

</body>
</html>
