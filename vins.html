<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vins</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

button{
  margin-top:16px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  width:100%;
  cursor:pointer;
}

.stars{
  display:flex;
  gap:10px;
  margin-top:12px;
  font-size:28px;
  cursor:pointer;
}

.star{
  opacity:0.3;
}

.star.active{
  opacity:1;
}

.card{
  background:#1e293b;
  padding:16px;
  margin-top:20px;
  border-radius:16px;
}

img{
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

.back{
  margin-top:20px;
  display:inline-block;
  color:#3b82f6;
}
</style>
</head>

<body>

<h2>Ajouter un vin</h2>

<input type="text" id="wineName" placeholder="Nom du vin">
<input type="file" id="winePhoto" accept="image/*">

<div class="stars" id="stars">
  <span class="star" data-value="1">⭐</span>
  <span class="star" data-value="2">⭐</span>
  <span class="star" data-value="3">⭐</span>
  <span class="star" data-value="4">⭐</span>
  <span class="star" data-value="5">⭐</span>
</div>

<button id="saveWine">Enregistrer</button>

<div id="wineList"></div>

<a href="memoire.html" class="back">← Retour</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl='https://fwfvbklrezgiwpfyywtv.supabase.co'
const supabaseKey='REMETS_TA_CLE_ANON'
const db=window.supabase.createClient(supabaseUrl,supabaseKey)

let rating=0

const stars=document.querySelectorAll(".star")

stars.forEach(star=>{
  star.onclick=()=>{
    rating=parseInt(star.dataset.value)
    updateStars()
  }
})

function updateStars(){
  stars.forEach(star=>{
    star.classList.toggle("active",star.dataset.value<=rating)
  })
}

async function uploadPhoto(file){
  const fileName=`wine_${Date.now()}`
  const {data,error}=await db.storage
    .from('memories')
    .upload(fileName,file)

  if(error){
    console.error(error)
    return null
  }

  const {data:publicUrl}=db.storage
    .from('memories')
    .getPublicUrl(fileName)

  return publicUrl.publicUrl
}

async function saveWine(){
  const name=document.getElementById("wineName").value
  const file=document.getElementById("winePhoto").files[0]

  if(!name)return

  let photoUrl=null

  if(file){
    photoUrl=await uploadPhoto(file)
  }

  await db.from('memories').insert([
    {
      category:'vin',
      title:name,
      rating,
      photo_url:photoUrl
    }
  ])

  document.getElementById("wineName").value=""
  document.getElementById("winePhoto").value=""
  rating=0
  updateStars()

  loadWines()
}

async function loadWines(){
  const {data}=await db
    .from('memories')
    .select('*')
    .eq('category','vin')
    .order('created_at',{ascending:false})

  const container=document.getElementById("wineList")
  container.innerHTML=""

  data.forEach(wine=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerHTML=`
      <strong>${wine.title}</strong><br>
      ${"⭐".repeat(wine.rating||0)}
      ${wine.photo_url?`<img src="${wine.photo_url}">`:''}
    `
    container.appendChild(div)
  })
}

document.getElementById("saveWine").onclick=saveWine

window.onload=loadWines
</script>

</body>
</html>
