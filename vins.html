<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mes Vins</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>Mes Vins</h2>
  <button class="add-btn" onclick="window.location.href='vin-add.html'">+</button>
</header>

<div id="wineList" class="wine-grid"></div>

<a href="memoire.html" class="back">← Retour</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl='https://fwfvbklrezgiwpfyywtv.supabase.co'
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3ZnZia2xyZXpnaXdwZnl5d3R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MzkwNDIsImV4cCI6MjA4NjQxNTA0Mn0.g58rXlwhfqvp5AiYZUOTlS-n2g-wG2Jufdyyu6ncSrg'
const db=window.supabase.createClient(supabaseUrl,supabaseKey)

async function deleteWine(wine){
  if(!confirm("Supprimer ce vin ?")) return

  if(wine.photo_url){
    const fileName = wine.photo_url.split('/').pop()
    await db.storage.from('memories').remove([fileName])
  }

  await db.from('memories').delete().eq('id',wine.id)
  loadWines()
}

async function loadWines(){
  const {data}=await db
    .from('memories')
    .select('*')
    .eq('category','vin')
    .order('rating',{ascending:false})
    .order('created_at',{ascending:false})

  const container=document.getElementById("wineList")
  container.innerHTML=""

  data.forEach(wine=>{

    const card=document.createElement("div")
    card.className="wine-card"

    const img=document.createElement("img")
img.className="wine-photo"
img.src=wine.photo_url || "https://via.placeholder.com/800x600?text=Vin"


    const deleteBtn=document.createElement("button")
    deleteBtn.className="delete-btn"
    deleteBtn.innerHTML="🗑"

    deleteBtn.onclick=(e)=>{
      e.stopPropagation()
      deleteWine(wine)
    }

    const overlay=document.createElement("div")
overlay.className="wine-overlay"
overlay.innerHTML=`
  <div class="wine-title">${wine.title}</div>
  <div class="wine-meta">${wine.domaine || ''} ${wine.annee || ''}</div>
  <div class="wine-stars">${"⭐".repeat(wine.rating || 0)}</div>
`

    

    card.appendChild(img)
    card.appendChild(deleteBtn)
    card.appendChild(overlay)

    // 🔍 RECHERCHE GOOGLE
    card.onclick=()=>{
      const query=`${wine.title || ""} ${wine.domaine || ""} ${wine.annee || ""} vin`
      const url="https://www.google.com/search?q="+encodeURIComponent(query)
      window.open(url,"_blank")
    }

    container.appendChild(card)
  })
}

window.onload=loadWines
</script>

</body>
</html>
